{% extends 'base.html' %}

{% block content %}

<div class="card">

<div class="card-body">

<h3>

Delete Task

</h3>

<p>

Are you sure you want to delete

<strong>

{{task.title}}

</strong>

?

</p>

<form method="POST">

{% csrf_token %}

<button class="btn btn-danger">

Delete

</button>

<a href="{% url 'dashboard' %}"

class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

{% endblock %}
